<!doctype html><html><head><title>Google Careers</title></head><body><script nonce="x">var AF_initDataCallback = function(){}; var keys=['ds:0','ds:1'];</script><script nonce="x">AF_initDataCallback({key: 'ds:0', hash: '1', data:[1], sideChannel: {}});</script><script nonce="x">AF_initDataCallback({key: 'ds:1', hash: '2', data:[[["132507027548054214", "Staff Developer Experience Engineer, DeepMind", "https://www.google.com/about/careers/applications/signin?jobId=CiUAL2FckXyYxFQfQGHlrZhhZbPzyA9LmCM2SUm_GzZUnJeutuHUEjsA1Ny_ixsdhjQZRuRLzOSVAjbY9khcW8pIPBS2zQQlH2noVdLQgoN8jMs5OPU8_3LKvW_gPelAWS99Jg%3D%3D_V2&loc=IN&title=Staff+Developer+Experience+Engineer", [null, "<ul>\n<li>Define and lead the technical go-to-market (GTM) strategy for AI models and tools (such as Gemini, Nano Banana, Google AI Studio), tailoring enablement and developer assets to the distinct needs of the Indian ecosystem (high-growth startups, developers, and enterprises).</li>\n<li>Execute strategic partnerships with regional developer platforms and startups in India, driving high-impact integrations that embed DeepMind technology into the local developer stack.</li>\n<li>Lead DeepMind’s regional technical strategy and advocacy, representing the organization at key developer events, steering the regional content and advocacy strategy to inspire the developer community.</li>\n<li>Influence global product and model research roadmaps by synthesizing technical findings, local constraints, and Indian developer feedback.</li>\n<li>Act as a strategic zeroth customer for DeepMind technology, partnering with core engineering teams on early-stage API design, usability, and architecture to ensure new features are production-ready for real-world deployment.</li>\n</ul>"], [null, "<h3>Minimum qualifications:</h3><ul>\n<li>Bachelor's degree or equivalent practical experience.<br></li>\n<li>7 years of experience in a technical role (e.g., software engineering, AI engineering, solutions consultant, etc.) or equivalent technical experience.</li>\n<li>5 years of experience with machine learning algorithms and tools, artificial intelligence, deep learning or natural language processing.</li>\n<li>Experience coding in Python, TypeScript, or JavaScript.<br></li>\n</ul><br><h3>Preferred qualifications:</h3><ul>\n<li>Strong understanding of the developer ecosystem in India and prior engagement with it.<br></li>\n<li>Ability to produce excellent code samples, clear documentation, and effective how-to materials to enable developer success with technical offerings.<br></li>\n<li>Ability to navigate ambiguity in a fast paced environment.<br></li>\n<li>Ownership of problems end-to-end and a team player with a collaborative mindset.<br></li>\n</ul>"], "projects/gweb-careers-proto/tenants/60107626-8e00-0000-0000-0071646e0806/companies/5364d68d-d016-48b0-a6ec-0c6fe5032c6c", null, "DeepMind", "en-US", [["Bengaluru, Karnataka, India", ["Bengaluru, Karnataka, India"], "Bengaluru", null, "KA", "IN"]], [null, "<p>DeepMind Developer Experience works at the intersection of Engineering, Product, and Community. We advocate developer success by delivering seamless experiences across our GenAI product suite. Through deep collaborations across Google, we empower developers by providing high-quality launch materials, education, technical outreach, and a supportive ecosystem for developers of all backgrounds.</p><div>As a Senior Developer Relations Engineer for DeepMind in India, you will operate at the intersection of Product, Engineering, Research, and one of the world's most dynamic developer communities. You will be a strategic leader, serving as the trusted Indian developer ecosystem inside DeepMind and the technical expert of our organization to the region.<br><br>Your mission is to define the developer relations strategy for India, advocating developer success and driving the adoption of our models and tools. You will actively shape our global product and research direction based on regional insights, lead local launch strategies, and scale a thriving AI builders ecosystem.<br><br>You will require a unique blend of deep technical expertise, developer empathy, and strategic thinking to navigate the rapid evolution of foundational AI and developer needs in India. You will work with a passionate, cross-functional global team of engineers, researchers, and product managers who are dedicated to pushing the boundaries of what’s possible. If you are excited to shape the developer experience for the world’s most advanced AI and build a thriving ecosystem in a key growth market, this is your chance to be at the forefront of this technological revolution.</div><p>Artificial intelligence will be one of humanity’s most transformative inventions. At DeepMind, we are a pioneering AI lab with exceptional interdisciplinary teams focused on advancing AI development to solve complex global challenges and accelerate high-quality product innovation for billions of users. We use our technologies for widespread public benefit and scientific discovery, ensuring safety and ethics are always our highest priority.</p><div>We are pushing the boundaries across multiple domains. Our global teams offer learning opportunities and varied career pathways for those driven to achieve exceptional results through collective effort.</div>"], [2], [1768435200, 8000000], [1781627862, 8000000], [1781627862, 197000000], [null, ""], null, null, [null, ""], [null, "<ul>\n<li>Bachelor's degree or equivalent practical experience.<br></li>\n<li>7 years of experience in a technical role (e.g., software engineering, AI engineering, solutions consultant, etc.) or equivalent technical experience.</li>\n<li>5 years of experience with machine learning algorithms and tools, artificial intelligence, deep learning or natural language processing.</li>\n<li>Experience coding in Python, TypeScript, or JavaScript.<br></li>\n</ul>"]], ["139289021426606790", "YouTube Ads Action Demand Verticals Tech Lead", "https://www.google.com/about/careers/applications/signin?jobId=CiUAL2FckY1zVq40n8JahVJtUHuuRGdoL3o9NuSJ_L-RhvyxthzfEjsA1Ny_i9j5PeX0G1e1tz2GYd4Lerp1bc6H70tujrmOiYXFaYqANbMbhBaGlQzvSA8IS7VQ_oRhL7ShCw%3D%3D_V2&loc=US&title=YouTube+Ads+Action+Demand+Verticals+Tech+Lead", [null, "<ul>\n<li>Manage verticals in conjunction with cross-functional counterparts (e.g., Program Manager (PM), UX, and Engineering leadership).</li>\n<li><div>Devise strategy and roadmaps to achieve business growth in these verticals.</div></li>\n<li>Work with a group of junior engineers to deliver on impactful projects.</li>\n</ul>"], [null, "<h3>Minimum qualifications:</h3><ul>\n<li>Bachelor's degree or equivalent practical experience.</li>\n<li>8 years of experience programming in Java or C++.</li>\n<li>5 years of experience testing, and launching software products, and 3 years of experience with software design and architecture.</li>\n<li>Experience in software engineering, including coding, code reviews, design discussions, and reviews.</li>\n<li>Experience with C++, Java, SQL, Data Analysis.</li>\n</ul><br><h3>Preferred qualifications:</h3><ul>\n<li>Master’s degree or PhD in Engineering, Computer Science, or a related technical field.</li>\n<li>8 years of experience with data structures/algorithms.</li>\n<li>3 years of experience working in a complex, matrixed organization involving cross-functional, or cross-business projects.</li>\n<li>3 years of experience in a technical leadership role leading project teams and setting technical direction.</li>\n<li>Coding proficiency in one or more of the following: SQL, Python, Java.</li>\n<li>Familiarity with ads systems.</li>\n</ul>"], "projects/gweb-careers-proto/tenants/60107626-8e00-0000-0000-0071646e0806/companies/ad872500-709d-4a93-97e3-76be227f77a1", null, "YouTube", "en-US", [["Mountain View, CA, USA", ["Google Building 40, 1600 Amphitheatre Pkwy, Mountain View, CA 94043, USA"], "Mountain View", "94043", "CA", "US"]], [null, "<p>The team provides ad demand, feature, and user experiences in Direct Response YouTube advertising. The team operates across ad products, including DemandGen and Performance Max, and verticals including Travel and Lead Generation. The team works full-stack to grow these ad products and bring new advertising capabilities to the market.</p><div><p>In this role, you will lead the YouTube Ads investment into priority verticals within DemandGen and PMax, particularly in the Lead Generation domain. This is a baseline of our advertisers, with a signal from the market for redefined advertising solutions. You will solve problems to deliver leads to advertisers by exploring the user experience, advertiser requirements, and quality understanding/measurement from a YouTube lens. You will deliver new solutions for lead generation on YouTube that connect our YouTube viewers to products and services that make a difference to their lives.</p></div><p>Google Ads is helping power the open internet with the best technology that connects and creates value for people, publishers, advertisers, and Google. We’re made up of multiple teams, building Google’s Advertising products including search, display, shopping, travel and video advertising, as well as analytics. Our teams create trusted experiences between people and businesses with useful ads. We help grow businesses of all sizes from small businesses, to large brands, to YouTube creators, with effective advertiser tools that deliver measurable results. We also enable Google to engage with customers at scale. <b></b></p>Individual pay is determined by factors including job-related skills, experience, and relevant education or training.  <br><br>US: $207000 - $301000 (USD) + 20% bonus target + equity + benefits<br><br>Learn more about <a href=\"https://www.google.com/about/careers/applications/benefits/\" target=\"_blank\">benefits at Google</a>."], [4, 3, 2], [1768435200, 51000000], [1781559568, 51000000], [1781559568, 124000000], [null, ""], null, null, [null, ""], [null, "<ul>\n<li>Bachelor's degree or equivalent practical experience.</li>\n<li>8 years of experience programming in Java or C++.</li>\n<li>5 years of experience testing, and launching software products, and 3 years of experience with software design and architecture.</li>\n<li>Experience in software engineering, including coding, code reviews, design discussions, and reviews.</li>\n<li>Experience with C++, Java, SQL, Data Analysis.</li>\n</ul>"], 3]], null, 3640, 20], sideChannel: {}});</script></body></html>
