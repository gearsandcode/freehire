allowBuilds:
  '@sentry/cli': set this to true or false
  core-js: set this to true or false
# pnpm 11 structural config — not a workspace definition (no packages: list).
# strictDepBuilds: false lets install proceed when @sentry/cli and core-js
# build scripts are skipped. @sentry/cli is only needed for source-map upload
# (gated on SENTRY_AUTH_TOKEN); core-js postinstall is non-critical.
strictDepBuilds: false
